<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Meus Cursos · WebEdu</title>
    <!-- Google Fonts + Font Awesome 6 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f4f7fc 0%, #eef2f5 100%);
            color: #1a2c3e;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Navbar moderna (igual ao dashboard) */
        nav {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e4a76, #2c7cb6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .nav-brand i {
            background: none;
            color: #2c7cb6;
            font-size: 1.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f0f4f9;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 500;
            color: #1e6bb8;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .back-link i {
            font-size: 0.9rem;
        }

        .back-link:hover {
            background: #e3eaf1;
            transform: translateX(-3px);
        }

        /* Container principal */
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Cabeçalho da página */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .page-header h2 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #1e4663;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header h2 i {
            color: #f0a34b;
            font-size: 2rem;
        }

        .estatistica {
            background: white;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2c7cb6;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid #e2edf7;
        }

        /* Lista de cursos */
        .cursos-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .curso-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 1.5rem 2rem;
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .curso-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
            border-color: rgba(31, 99, 146, 0.15);
        }

        .curso-info {
            flex: 2;
            min-width: 200px;
        }

        .curso-info h3 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #1f4662;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        .curso-info h3 i {
            color: #2c7cb6;
            font-size: 1.3rem;
        }

        .curso-descricao {
            color: #4a6179;
            font-size: 0.9rem;
            margin-top: 0.3rem;
            line-height: 1.45;
        }

        .curso-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.8rem;
            font-size: 0.75rem;
            color: #6f8eab;
        }

        .curso-meta i {
            margin-right: 4px;
            font-size: 0.7rem;
        }

        .btn-acessar {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(105deg, #1f6392, #1f7ca8);
            color: white;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(31, 99, 146, 0.2);
            border: none;
            cursor: pointer;
        }

        .btn-acessar:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #0e5278, #146b90);
            box-shadow: 0 8px 18px rgba(31, 99, 146, 0.25);
        }

        .btn-acessar i {
            font-size: 0.9rem;
        }

        /* Estado vazio (nenhum curso) */
        .empty-state {
            background: #ffffff;
            border-radius: 32px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
            border: 1px dashed #cbdde9;
        }

        .empty-state i {
            font-size: 3rem;
            color: #b9d0e4;
            margin-bottom: 1rem;
        }

        .empty-state p {
            font-size: 1rem;
            color: #5f7d9c;
            margin-bottom: 1.5rem;
        }

        .empty-state .btn-explorar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2c7cb6;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .empty-state .btn-explorar:hover {
            background: #1e5f8a;
            transform: translateY(-2px);
        }

        /* responsividade */
        @media (max-width: 680px) {
            .container {
                padding: 0 1rem;
                margin: 1.5rem auto;
            }
            .curso-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 1.3rem;
            }
            .btn-acessar {
                align-self: flex-start;
                margin-top: 0.5rem;
            }
            .page-header h2 {
                font-size: 1.5rem;
            }
            nav {
                padding: 0.8rem 1rem;
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* loader sutil para carregamento */
        .loading-skeleton {
            background: #fff;
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1rem;
            color: #7c98b3;
            font-size: 0.75rem;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/dashboard" class="back-link">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>
        <div class="nav-brand">
            <i class="fas fa-graduation-cap"></i>
            <span>WebEdu</span>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>
                <i class="fas fa-book-open"></i> 
                Meus cursos comprados
            </h2>
            <div class="estatistica" id="quantidadeCursos">
                <i class="fas fa-layer-group"></i> Carregando...
            </div>
        </div>

        <div id="listaCursos" class="cursos-grid">
            <!-- Skeletons de carregamento serão exibidos inicialmente -->
            <div class="loading-skeleton">
                <div style="width: 70%;"><i class="fas fa-spinner fa-pulse"></i> Carregando seus cursos...</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <i class="fas fa-laptop-code"></i> WebEdu · sua jornada de aprendizado
    </div>

    <script>
        // Função auxiliar para formatar data
        function formatarData(dataISO) {
            if (!dataISO) return 'Data indisponível';
            const data = new Date(dataISO);
            return data.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        // Função para escapar HTML (segurança)
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function carregarCursos() {
            const container = document.getElementById('listaCursos');
            const quantidadeSpan = document.getElementById('quantidadeCursos');
            
            try {
                // Mostra skeletons enquanto carrega
                container.innerHTML = `
                    <div class="loading-skeleton"><i class="fas fa-spinner fa-pulse"></i> Buscando sua biblioteca...</div>
                `;
                
                const resp = await fetch('/api/compras');
                if (!resp.ok) {
                    throw new Error('Erro ao carregar compras');
                }
                const cursos = await resp.json();
                
                // Atualiza contador
                if (quantidadeSpan) {
                    quantidadeSpan.innerHTML = `<i class="fas fa-book"></i> ${cursos.length} curso${cursos.length !== 1 ? 's' : ''}`;
                }
                
                if (!cursos || cursos.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-folder-open"></i>
                            <p>Você ainda não possui nenhum curso em sua biblioteca.</p>
                            <a href="/" class="btn-explorar"><i class="fas fa-store"></i> Explorar cursos</a>
                        </div>
                    `;
                    return;
                }
                
                // Renderiza lista de cursos com design refinado
                container.innerHTML = cursos.map(curso => {
                    const tituloSafe = escapeHtml(curso.titulo) || 'Curso sem título';
                    const descricaoSafe = escapeHtml(curso.descricao) || 'Descrição não disponível';
                    const dataCompra = curso.data_compra ? formatarData(curso.data_compra) : 'Data desconhecida';
                    const cursoId = curso.id || (curso.id_curso || '');
                    
                    return `
                        <div class="curso-card">
                            <div class="curso-info">
                                <h3>
                                    <i class="fas fa-graduation-cap"></i> 
                                    ${tituloSafe}
                                </h3>
                                <div class="curso-descricao">
                                    ${descricaoSafe.length > 120 ? descricaoSafe.substring(0, 120) + '…' : descricaoSafe}
                                </div>
                                <div class="curso-meta">
                                    <span><i class="fas fa-calendar-alt"></i> Comprado em ${dataCompra}</span>
                                    <span><i class="fas fa-file-alt"></i> E-book completo</span>
                                </div>
                            </div>
                            <a href="/curso/${cursoId}" class="btn-acessar">
                                <i class="fas fa-eye"></i> Acessar conteúdo
                            </a>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Erro ao buscar cursos:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Não foi possível carregar seus cursos. Verifique sua conexão.</p>
                        <button onclick="window.location.reload()" class="btn-explorar" style="background:#6c757d; border:none; cursor:pointer;">
                            <i class="fas fa-sync-alt"></i> Tentar novamente
                        </button>
                    </div>
                `;
                if (quantidadeSpan) quantidadeSpan.innerHTML = `<i class="fas fa-ban"></i> Erro`;
            }
        }
        
        // Carrega os cursos ao iniciar
        carregarCursos();
    </script>
</body>
</html>
