<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Novo Curso · WebEdu</title>
    <!-- Google Fonts + Font Awesome 6 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f4f7fc 0%, #eef2f5 100%);
            color: #1a2c3e;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Navbar moderna (igual ao dashboard) */
        nav {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e4a76, #2c7cb6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .nav-brand i {
            background: none;
            color: #2c7cb6;
            font-size: 1.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f0f4f9;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 500;
            color: #1e6bb8;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .back-link i {
            font-size: 0.9rem;
        }

        .back-link:hover {
            background: #e3eaf1;
            transform: translateX(-3px);
        }

        /* Container principal - card elegante */
        .container {
            max-width: 780px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .form-card {
            background: #ffffff;
            border-radius: 32px;
            padding: 2rem 2rem 2.2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .form-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e4663;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-card h2 i {
            color: #f0a34b;
            font-size: 1.8rem;
        }

        .subhead {
            color: #5f7d9c;
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
            border-left: 3px solid #2c7cb6;
            padding-left: 12px;
            margin-top: 0.2rem;
        }

        /* Estilos dos campos */
        .form-group {
            margin-bottom: 1.4rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1f4662;
            margin-bottom: 0.5rem;
        }

        label i {
            color: #2c7cb6;
            font-size: 1rem;
            width: 1.2rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Inter', monospace;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background: #fefefe;
            color: #1a2c3e;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #2c7cb6;
            box-shadow: 0 0 0 3px rgba(44, 124, 182, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* contador de caracteres elegante */
        .char-counter {
            text-align: right;
            font-size: 0.75rem;
            margin-top: 0.4rem;
            font-weight: 500;
            color: #7c95af;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
        }

        .char-counter i {
            font-size: 0.7rem;
        }

        .counter-warning {
            color: #d9534f;
        }

        /* mensagem de erro */
        .error-message {
            background: #fff5f5;
            border-left: 4px solid #d32f2f;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            margin: 1rem 0;
            font-size: 0.85rem;
            color: #b91c1c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error-message i {
            font-size: 1rem;
        }

        /* botão principal */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background: linear-gradient(105deg, #1f6392, #1f7ca8);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 0.8rem;
            box-shadow: 0 4px 12px rgba(31, 99, 146, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #0e5278, #146b90);
            box-shadow: 0 10px 20px rgba(31, 99, 146, 0.25);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        /* dica extra de preenchimento */
        .info-tip {
            background: #f0f6fe;
            border-radius: 18px;
            padding: 0.7rem 1rem;
            margin-top: 1.2rem;
            font-size: 0.75rem;
            color: #2c698d;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #d9e6f5;
        }

        .info-tip i {
            font-size: 1rem;
        }

        /* responsividade */
        @media (max-width: 640px) {
            .container {
                padding: 0 1rem;
                margin: 1.2rem auto;
            }
            .form-card {
                padding: 1.5rem;
            }
            .form-card h2 {
                font-size: 1.5rem;
            }
            nav {
                padding: 0.8rem 1rem;
                flex-direction: column;
                align-items: flex-start;
            }
            .back-link {
                margin-bottom: 0.2rem;
            }
        }

        /* loader sutil no botão (feedback) */
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/dashboard" class="back-link">
            <i class="fas fa-arrow-left"></i> Voltar ao dashboard
        </a>
        <div class="nav-brand">
            <i class="fas fa-graduation-cap"></i>
            <span>WebEdu</span>
        </div>
    </nav>
    <div class="container">
        <div class="form-card">
            <h2>
                <i class="fas fa-feather-alt"></i> 
                Publicar novo e-book
            </h2>
            <div class="subhead">
                Compartilhe conhecimento com milhares de alunos
            </div>

            <form id="cursoForm">
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> Título do curso</label>
                    <input type="text" name="titulo" placeholder="Ex.: JavaScript Avançado para Web" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Descrição (opcional)</label>
                    <textarea name="descricao" rows="3" placeholder="O que os alunos vão aprender? Diferenciais do conteúdo..."></textarea>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Preço (R$)</label>
                    <input type="number" step="0.01" min="0" name="preco" placeholder="29,90" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-file-alt"></i> Conteúdo do e-book (máx. 5000 caracteres)</label>
                    <textarea name="ebook" rows="10" placeholder="Digite aqui o conteúdo completo do e-book, aulas, textos ou material exclusivo..." required></textarea>
                    <div class="char-counter" id="charCounterWrapper">
                        <i class="fas fa-keyboard"></i> <span id="contador">0</span> / 5000 caracteres
                    </div>
                </div>

                <div id="mensagemErro" class="error-message" style="display: none;">
                    <i class="fas fa-circle-exclamation"></i> <span id="erroTexto"></span>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <i class="fas fa-cloud-upload-alt"></i> Publicar curso
                </button>

                <div class="info-tip">
                    <i class="fas fa-info-circle"></i>
                    <span>Após a publicação, o curso ficará visível na loja. Alunos poderão comprar e acessar o e-book imediatamente.</span>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Elementos do DOM
        const ebookField = document.querySelector('[name="ebook"]');
        const contadorSpan = document.getElementById('contador');
        const charWrapper = document.getElementById('charCounterWrapper');
        const form = document.getElementById('cursoForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('mensagemErro');
        const errorText = document.getElementById('erroTexto');

        // Atualização do contador com estilo dinâmico
        function updateCounter() {
            const len = ebookField.value.length;
            contadorSpan.textContent = len;
            
            if (len > 5000) {
                contadorSpan.style.color = '#d32f2f';
                contadorSpan.style.fontWeight = 'bold';
                charWrapper.classList.add('counter-warning');
                // feedback visual extra
                ebookField.style.borderColor = '#d32f2f';
            } else {
                contadorSpan.style.color = '#2c7cb6';
                contadorSpan.style.fontWeight = '500';
                charWrapper.classList.remove('counter-warning');
                ebookField.style.borderColor = '#e2e8f0';
            }
        }

        // Limitar caracteres no evento input (impedir ultrapassagem)
        ebookField.addEventListener('input', () => {
            let len = ebookField.value.length;
            if (len > 5000) {
                ebookField.value = ebookField.value.substring(0, 5000);
                len = 5000;
                // opcional: mostrar mensagem temporária
                const warningMsg = document.createElement('div');
                warningMsg.className = 'error-message';
                warningMsg.style.margin = '0.5rem 0 0';
                warningMsg.style.padding = '0.5rem';
                warningMsg.style.fontSize = '0.7rem';
                warningMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Limite de 5000 caracteres atingido.';
                const parent = ebookField.parentNode;
                let oldWarning = parent.querySelector('.temp-limit-warning');
                if(oldWarning) oldWarning.remove();
                warningMsg.classList.add('temp-limit-warning');
                parent.appendChild(warningMsg);
                setTimeout(() => warningMsg.remove(), 2000);
            }
            updateCounter();
        });

        // Inicializa contador
        updateCounter();

        // Submissão com feedback visual e tratamento de erros
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Validação extra de limite antes de enviar
            if (ebookField.value.length > 5000) {
                showError("O e-book excede o limite de 5000 caracteres. Por favor, reduza o conteúdo.");
                return;
            }

            // Desabilitar botão para evitar duplicação
            submitBtn.disabled = true;
            const originalBtnContent = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Publicando...';
            
            // Limpar erros antigos
            errorDiv.style.display = 'none';
            errorText.innerText = '';
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.preco = parseFloat(data.preco);
            
            // Validações semânticas adicionais
            if (!data.titulo || data.titulo.trim() === '') {
                showError("Por favor, informe um título para o curso.");
                resetButton();
                return;
            }
            if (isNaN(data.preco) || data.preco < 0) {
                showError("Informe um preço válido (R$).");
                resetButton();
                return;
            }
            if (!data.ebook || data.ebook.trim() === '') {
                showError("O conteúdo do e-book não pode estar vazio.");
                resetButton();
                return;
            }
            
            try {
                const resp = await fetch('/api/cursos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await resp.json();
                
                if (resp.ok) {
                    // Exibe mensagem de sucesso suave e redireciona
                    alert(result.mensagem || "Curso publicado com sucesso!");
                    window.location.href = '/dashboard';
                } else {
                    showError(result.erro || "Ocorreu um erro ao publicar. Tente novamente.");
                    resetButton();
                }
            } catch (err) {
                console.error(err);
                showError("Erro de conexão com o servidor. Verifique sua internet.");
                resetButton();
            }
            
            function resetButton() {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnContent;
            }
        });
        
        function showError(msg) {
            errorText.innerText = msg;
            errorDiv.style.display = 'flex';
            // rolar suavemente até o erro
            errorDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // Limpar erro ao digitar nos campos
        const allInputs = document.querySelectorAll('input, textarea');
        allInputs.forEach(input => {
            input.addEventListener('input', () => {
                errorDiv.style.display = 'none';
            });
        });
    </script>
</body>
</html>
